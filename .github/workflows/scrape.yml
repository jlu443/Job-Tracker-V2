name: scrape-jobs

on:
  schedule:
    # Every hour. Note: GitHub cron is best-effort and often runs late,
    # especially at the top of the hour — expect some jitter or skipped slots.
    - cron: "0 * * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Allow the job to push the updated DB back to the repo.
permissions:
  contents: write

# Don't let two runs race on the committed DB.
concurrency:
  group: scrape-jobs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Healthy runs finish in ~10-15 min; fail fast when something hangs.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # (HuggingFace model cache removed: use_llm_fallback is off in CI —
      # bart-large-mnli on a CPU runner can't classify this volume in time.
      # Restore an actions/cache step for ~/.cache/huggingface if re-enabled.)

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
          JOBSPY_PROXY: ${{ secrets.JOBSPY_PROXY }}  # optional residential proxy
        run: python -m src.main

      - name: Commit updated database
        # Run even if the scraper step failed or timed out: the DB is synced
        # before notify/sheets run, so a late failure must not throw away the
        # run's postings (that's what caused every posting to look "new" again
        # on the next run).
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/jobs.db
          if git diff --staged --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "chore: update jobs.db [skip ci]"
            git pull --rebase origin main
            git push
          fi
