name: scrape-jobs

on:
  schedule:
    # Every 6 hours. Note: GitHub cron is best-effort and often runs late.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Allow the job to push the updated DB back to the repo.
permissions:
  contents: write

# Don't let two runs race on the committed DB.
concurrency:
  group: scrape-jobs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db
          if git diff --staged --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "chore: update jobs.db [skip ci]"
            git push
          fi
