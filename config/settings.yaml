# Global scraper settings.

# Server-side search terms. The scraper issues one paged query per term per
# company, so a job matching any term is captured. Empty string "" means
# "all jobs" (no filter) — remove it if you only want keyword-matched roles.
search_terms:
  - intern
  - new grad
  - university
  - early career
  - entry level

# Pagination
page_limit: 20          # Workday caps at ~20 per request
max_pages_per_term: 50  # safety cap: 50 * 20 = 1000 jobs per term

# Politeness
request_timeout: 30     # seconds
delay_between_requests: 0.5  # seconds, to avoid hammering a tenant
scrape_workers: 8       # companies scraped concurrently (different hosts)

# Classification: keyword pass is always on. The zero-shot fallback (facebook/bart-large-mnli)
# only runs for ambiguous titles when this is true. Model downloads ~1.6GB on first use.
# Keep this OFF in CI: ~15k ambiguous titles per run takes hours on a CPU runner
# and times out the workflow. Inconclusive titles default to "mid", which is never
# announced anyway, so the fallback adds nothing for notifications.
use_llm_fallback: false

# Enrichment: fetch the full description of each new intern/new_grad posting
# (a handful of extra requests per run) and parse it into flags — visa
# sponsorship (no/yes), security clearance, graduation-year window. Flags show
# up in the Discord embed, the Google Sheet, and the DB.
enrich_descriptions: true
# When true, jobs whose description explicitly rules out visa sponsorship
# (or requires US citizenship) are dropped from Discord/Sheets announcements.
exclude_no_sponsorship: false

# External job board scraping via JobSpy (Indeed, Glassdoor, ZipRecruiter).
# LinkedIn is intentionally excluded — it blocks datacenter IPs (GitHub Actions).
jobspy:
  enabled: true
  sites:
    - indeed
    - glassdoor
    - zip_recruiter
  # glassdoor and zip_recruiter require a residential proxy from CI (set JOBSPY_PROXY secret).
  # Without it, only Indeed works from GitHub Actions datacenter IPs.
  search_terms:
    - software engineer intern
    - software engineering internship
    - new grad software engineer
    - entry level software engineer
  location: United States
  results_per_term: 100
  hours_old: 72    # only jobs posted in the last 3 days
